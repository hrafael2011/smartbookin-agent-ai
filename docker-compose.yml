

services:
  api-backend:
    build: ./backend/api-backend
    entrypoint: ["/app/entrypoint.sh"]
    volumes:
      - ./backend/api-backend:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    # Sin recrear el contenedor, nuevas claves en .env no se aplican; además default para pruebas
    environment:
      DISABLE_USAGE_LIMITS: ${DISABLE_USAGE_LIMITS:-true}
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:15
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: smartbooking
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smartbooking"]
      interval: 5s
      timeout: 5s
      retries: 30
    restart: unless-stopped

  # Construye el frontend y deja dist/ en volumen compartido
  frontend-build:
    build: ./frontend
    working_dir: /app
    command: >
      sh -c "rm -rf /var/www/app/dist &&
             cp -r dist /var/www/app/dist"
    volumes:
      - webroot:/var/www/app
    restart: "no"

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      frontend-build:
        condition: service_completed_successfully
      api-backend:
        condition: service_started
    ports:
      - "8080:80"
    volumes:
      - ./nginx_new_default.conf:/etc/nginx/conf.d/default.conf:ro
      - webroot:/var/www/app
      
      
    restart: unless-stopped

  # Túnel HTTPS hacia Nginx (app + /api + /webhooks). Requiere token en .env: AUTO_TOKEN_NGROK
  # Uso: docker compose --profile ngrok up -d
  # Luego: ./scripts/telegram-webhook-sync.sh
  ngrok:
    image: ngrok/ngrok:latest
    profiles: ["ngrok"]
    depends_on:
      nginx:
        condition: service_started
    environment:
      NGROK_AUTHTOKEN: ${AUTO_TOKEN_NGROK:-}
    command: ["http", "--log=stdout", "http://nginx:80"]
    ports:
      - "4040:4040"
    restart: unless-stopped

volumes:
  postgres_data:
  webroot:
  staticfiles:



